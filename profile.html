<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixora — Profile</title>
    <link rel="icon" type="image/x-icon" href="./favicon_io/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./CSS/global.css" />
    <link rel="stylesheet" href="./CSS/profile.css" />
</head>
<body>

    <!-- Custom Cursor -->
    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>

    <!-- Minimal Nav -->
    <header class="minimal-nav">
        <div class="logo">
            <a href="./index.html"><span>Pixora</span></a>
        </div>
        <ul class="nav-links">
            <li><a href="./watch.html">Watch</a></li>
            <li><a href="./explore.html">Explore</a></li>
            <li><a href="./gallery.html">Gallery</a></li>
        </ul>
        <div class="buttons d-flex align-items-center gap-3">
            <div class="user-icon">
                <a href="./profile.html">
                    <img src="https://static.vecteezy.com/system/resources/thumbnails/002/318/271/small_2x/user-profile-icon-free-vector.jpg" alt="User Profile" />
                </a>
                <div class="magnetic-wrap ml-2">
                    <button class="magnetic-btn border text-secondary" id="logout-button">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container py-5 mt-5">
        
        <div class="profile-header text-center mb-5 reveal pt-5">
            <img src="https://static.vecteezy.com/system/resources/thumbnails/002/318/271/small_2x/user-profile-icon-free-vector.jpg" alt="Profile" class="profile-avatar mb-4 mx-auto rounded-circle d-block border" style="width: 120px; height: 120px; object-fit: cover;" />
            <h1 class="title-display mb-2" style="font-size: 3rem;" id="userNameDisplay">Curator</h1>
            <p class="text-secondary" id="userEmailDisplay">loading...</p>
        </div>

        <section class="profile-dashboard reveal mx-auto" style="max-width: 900px; transition-delay: 0.2s;">
            
            <div class="row g-4">
                <!-- Data Card -->
                <div class="col-md-4">
                    <div class="p-card">
                        <h4 class="text-secondary small text-uppercase mb-3">Saved Items</h4>
                        <div class="display-4 font-display">142</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="p-card">
                        <h4 class="text-secondary small text-uppercase mb-3">Collections</h4>
                        <div class="display-4 font-display">12</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="p-card">
                        <h4 class="text-secondary small text-uppercase mb-3">Contributions</h4>
                        <div class="display-4 font-display">0</div>
                    </div>
                </div>
            </div>

            <div class="mt-5 pt-4 border-top" style="border-color: var(--border-light) !important;">
                <h2 class="title-section mb-4">Account Settings</h2>
                <div class="p-card">
                    <form id="profileForm">
                        <div class="mb-4">
                            <label class="text-secondary small text-uppercase d-block mb-2">Display Name</label>
                            <input type="text" class="minimal-dash-input" value="Curator" />
                        </div>
                        <div class="mb-5">
                            <label class="text-secondary small text-uppercase d-block mb-2">Primary Email</label>
                            <input type="email" class="minimal-dash-input text-secondary" id="emailInput" readonly />
                        </div>
                        <div class="magnetic-wrap p-0 m-0">
                            <button type="button" class="magnetic-btn text-dark" style="background: #fff;">Update Settings</button>
                        </div>
                    </form>
                </div>
            </div>

        </section>

    </main>

    <footer class="minimal-footer reveal">
        <div class="footer-links">
            <a href="./terms.html">Terms of Service</a>
            <a href="./privacy.html">Privacy Policy</a>
            <a href="mailto:keshav40353@gmail.com">Contact Us</a>
            <a href="./about.html">About Us</a>
        </div>
        <p>&copy; 2024 Pixora Archive. Designed for visual excellence.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const isLoggedIn = localStorage.getItem("isLoggedIn") === "true";
            
            if (!isLoggedIn) {
                // Not logged in, redirect to login page
                window.location.href = "./login.html";
            } else {
                // Populate email
                const email = localStorage.getItem("email") || "user@domain.com";
                document.getElementById('userEmailDisplay').textContent = email;
                document.getElementById('emailInput').value = email;
            }
        });
    </script>
</body>
</html>
