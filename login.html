<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixora — Access</title>
    <link rel="icon" type="image/x-icon" href="./favicon_io/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./CSS/global.css" />
    <link rel="stylesheet" href="./CSS/login.css" />
</head>
<body class="minimal-login">

    <!-- Custom Cursor -->
    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>

    <!-- Back Home -->
    <a href="./index.html" class="back-link reveal"><i class="fa-solid fa-arrow-left me-2"></i> Return Home</a>

    <div class="split-layout">
        
        <!-- Left Side: Editorial Image -->
        <div class="split-image reveal">
            <!-- Utilizing an artistic image for the login split screen for premium feel -->
            <img src="./images/Leonardo_Phoenix_A_mesmerizing_abstract_wave_of_luminescent_en_2.jpg" alt="Abstract Art" class="bg-img" />
            <div class="image-text">
                <h1 class="title-display">Enter<br>The Archive.</h1>
            </div>
        </div>

        <!-- Right Side: Minimal Auth Forms -->
        <div class="split-form reveal" style="transition-delay: 0.2s;">
            <div class="form-wrapper">
                
                <div class="logo-mark mb-5">
                    <span>Pixora</span>
                </div>

                <!-- Form Controls (Tabs) -->
                <div class="form-tabs mb-5">
                    <button class="tab-btn active" id="tabSignIn">Sign In</button>
                    <button class="tab-btn" id="tabSignUp">Create Account</button>
                </div>

                <!-- Sign In View -->
                <form id="signInForm" class="auth-view active-view">
                    <div class="input-group minimal-input mb-4">
                        <label for="si-email">Email Address</label>
                        <input type="email" id="si-email" placeholder="name@domain.com" required />
                    </div>
                    <div class="input-group minimal-input mb-5">
                        <label for="si-pass">Password</label>
                        <input type="password" id="si-pass" placeholder="••••••••" required />
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-5">
                        <a href="#" class="text-secondary small text-decoration-underline" style="font-size: 0.8rem;">Forgot password?</a>
                        <div class="magnetic-wrap m-0 p-0">
                            <button type="submit" class="magnetic-btn btn-primary" style="background: var(--text-primary); color: var(--bg-dark);">Sign In</button>
                        </div>
                    </div>
                </form>

                <!-- Sign Up View -->
                <form id="signUpForm" class="auth-view">
                    <div class="input-group minimal-input mb-4">
                        <label for="su-email">Email Address</label>
                        <input type="email" id="su-email" placeholder="name@domain.com" required />
                    </div>
                    <div class="input-group minimal-input mb-4">
                        <label for="su-pass">Password</label>
                        <input type="password" id="su-pass" placeholder="Create a secure password" required />
                    </div>
                    <div class="input-group minimal-input mb-5">
                        <label for="su-date">Date of Birth</label>
                        <input type="date" id="su-date" class="text-secondary" required />
                    </div>
                    
                    <div class="d-flex justify-content-end mb-4">
                        <div class="magnetic-wrap m-0 p-0">
                            <button type="submit" class="magnetic-btn btn-primary" style="background: var(--text-primary); color: var(--bg-dark);">Initialize Profile</button>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="./js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Tab Logic
            const tabSignIn = document.getElementById('tabSignIn');
            const tabSignUp = document.getElementById('tabSignUp');
            const signInForm = document.getElementById('signInForm');
            const signUpForm = document.getElementById('signUpForm');

            tabSignIn.addEventListener('click', () => {
                tabSignIn.classList.add('active');
                tabSignUp.classList.remove('active');
                signInForm.classList.add('active-view');
                signUpForm.classList.remove('active-view');
            });

            tabSignUp.addEventListener('click', () => {
                tabSignUp.classList.add('active');
                tabSignIn.classList.remove('active');
                signUpForm.classList.add('active-view');
                signInForm.classList.remove('active-view');
            });

            // Auth Submission Mock Logic
            const handleFormSubmission = (form, isLogin) => {
                const email = form.querySelector('input[type="email"]').value.trim();
                const password = form.querySelector('input[type="password"]').value.trim();
                
                if (!email || !password) return;

                if (isLogin) {
                    localStorage.setItem("isLoggedIn", "true");
                    localStorage.setItem("email", email);
                    window.location.href = "./index.html";
                } else {
                    const birthdate = form.querySelector('input[type="date"]').value.trim();
                    if (!birthdate) return;
                    
                    localStorage.setItem("registeredEmail", email);
                    alert("Profile Registered. You may now sign in.");
                    tabSignIn.click(); // Switch back to login
                }
            };

            document.getElementById('signInForm').addEventListener("submit", (e) => {
                e.preventDefault();
                handleFormSubmission(e.target, true);
            });

            document.getElementById('signUpForm').addEventListener("submit", (e) => {
                e.preventDefault();
                handleFormSubmission(e.target, false);
            });
            
            // Animation Trigger
            setTimeout(() => {
                document.querySelectorAll('.reveal').forEach(el => el.classList.add('revealed'));
            }, 100);
        });
    </script>
</body>
</html>
